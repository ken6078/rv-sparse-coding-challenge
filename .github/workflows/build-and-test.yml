name: Build and Test

on:
  push:
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install build tools
        run: sudo apt-get update && sudo apt-get install -y build-essential

      - name: Build
        run: gcc -Wall -Wextra -Werror -o run challenge.c -lm

      - name: Test
        run: |
          ./run | tee test-output.txt
          grep -F "All tests passed! (100/100 iterations passed)" test-output.txt
